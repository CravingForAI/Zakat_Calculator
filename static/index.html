<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Zakat Calculator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f4f4f4;\n        }\n        .calculator {\n            background: white;\n            padding: 20px;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0,0,0,0.1);\n        }\n        input[type='number'] {\n            width: 100%;\n            padding: 10px;\n            margin: 10px 0;\n            border: 1px solid #ccc;\n            border-radius: 4px;\n        }\n        button {\n            background: #28a745;\n            color: white;\n            border: none;\n            border-radius: 4px;\n            padding: 10px;\n            cursor: pointer;\n            width: 100%;\n        }\n        button:hover {\n            background: #218838;\n        }\n    </style>\n</head>\n<body>\n    <div class="calculator">\n        <h1>Zakat Calculator</h1>\n        <label for="wealth">Total Wealth:</label>\n        <input type="number" id="wealth" placeholder="Enter your total wealth" required>\n        <label for="debt">Total Debt:</label>\n        <input type="number" id="debt" placeholder="Enter your total debt" required>\n        <button onclick="calculateZakat()">Calculate Zakat</button>\n        <h2 id="result"></h2>\n    </div>\n    <script>\n        function calculateZakat() {\n            const wealth = parseFloat(document.getElementById('wealth').value);\n            const debt = parseFloat(document.getElementById('debt').value);\n            const zakatRate = 0.025; // 2.5%\n            const netWealth = wealth - debt;\n            const zakat = netWealth > 0 ? netWealth * zakatRate : 0;\n            document.getElementById('result').innerText = `Your Zakat: $${zakat.toFixed(2)}`;\n        }\n    </script>\n</body>\n</html>
